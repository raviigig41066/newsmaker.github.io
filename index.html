<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Marwar Time News Studio</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f0eb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* ===== MAIN CARD ===== */
        .studio-card {
            max-width: 420px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            padding: 24px 20px 32px;
            transition: all 0.2s ease;
        }

        /* ===== HEADER ===== */
        .studio-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .studio-header .icon {
            font-size: 32px;
            background: #8B1E1E;
            color: #fff;
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .studio-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1e1e1e;
            line-height: 1.2;
        }

        .studio-header h1 span {
            display: block;
            font-size: 13px;
            font-weight: 400;
            color: #6b6b6b;
            margin-top: 2px;
        }

        /* ===== PREVIEW AREA (News Card) ===== */
        .news-preview {
            background: #faf8f6;
            border-radius: 20px;
            padding: 20px 16px;
            margin-bottom: 24px;
            border: 1px dashed #d0c8c0;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .news-preview .headline {
            font-size: 22px;
            font-weight: 700;
            color: #1e1e1e;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .news-preview .headline-placeholder {
            color: #a09a94;
            font-weight: 400;
            font-size: 16px;
        }

        .news-preview .date {
            font-size: 14px;
            color: #6b6b6b;
            background: #efebe8;
            padding: 4px 16px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 6px;
        }

        .news-preview .news-image-placeholder {
            width: 100%;
            max-width: 200px;
            height: 100px;
            background: #e8e2dc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8a7e76;
            font-size: 13px;
            margin-top: 12px;
        }

        /* ===== FORM / INPUTS ===== */
        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #3d3d3d;
            margin-bottom: 5px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #ddd6d0;
            border-radius: 14px;
            font-size: 15px;
            background: #fcfaf8;
            transition: border 0.2s;
            font-family: inherit;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #8B1E1E;
            background: #fff;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        /* ===== BUTTONS ===== */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            width: 100%;
            touch-action: manipulation;
            user-select: none;
        }

        .btn-primary {
            background: #8B1E1E;
            color: #fff;
        }

        .btn-primary:active {
            transform: scale(0.97);
            background: #6e1717;
        }

        .btn-secondary {
            background: #efebe8;
            color: #2d2d2d;
        }

        .btn-secondary:active {
            transform: scale(0.97);
            background: #ddd6d0;
        }

        .btn-success {
            background: #1e7b4a;
            color: #fff;
        }

        .btn-success:active {
            transform: scale(0.97);
            background: #15633a;
        }

        /* ===== RESPONSIVE TWEAKS ===== */
        @media (max-width: 480px) {
            .studio-card {
                padding: 20px 16px 24px;
                border-radius: 20px;
            }

            .studio-header h1 {
                font-size: 17px;
            }

            .studio-header .icon {
                width: 44px;
                height: 44px;
                font-size: 26px;
            }

            .news-preview .headline {
                font-size: 19px;
            }

            .btn {
                padding: 13px 16px;
                font-size: 15px;
            }
        }

        @media (max-width: 380px) {
            body {
                padding: 10px;
            }

            .studio-card {
                padding: 16px 12px 20px;
            }

            .studio-header h1 {
                font-size: 15px;
            }

            .studio-header .icon {
                width: 38px;
                height: 38px;
                font-size: 20px;
            }
        }

        /* ===== UTILITY ===== */
        .text-muted {
            color: #8a7e76;
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
        }

        .mt-1 { margin-top: 8px; }
    </style>
</head>
<body>

    <div class="studio-card">

        <!-- HEADER -->
        <div class="studio-header">
            <div class="icon">📰</div>
            <h1>
                Marwar Time News Studio
                <span>Create &amp; Download News Headlines</span>
            </h1>
        </div>

        <!-- NEWS PREVIEW -->
        <div class="news-preview" id="newsPreview">
            <div class="headline" id="headlineDisplay">
                <span class="headline-placeholder">Your Headline Here</span>
            </div>
            <div class="date" id="dateDisplay">📅 11 July 2026</div>
            <div class="news-image-placeholder">
                <i class="fas fa-image" style="margin-right: 6px;"></i> Image Placeholder
            </div>
        </div>

        <!-- INPUTS -->
        <div class="input-group">
            <label for="headlineInput"><i class="fas fa-pen-fancy"></i> Headline</label>
            <input type="text" id="headlineInput" placeholder="Type your news headline..." value="Breaking: Major Event Today">
        </div>

        <div class="input-group">
            <label for="dateInput"><i class="far fa-calendar-alt"></i> Date</label>
            <input type="date" id="dateInput">
        </div>

        <!-- BUTTONS -->
        <div class="btn-group">
            <button class="btn btn-primary" id="generateBtn">
                <i class="fas fa-wand-sparkles"></i> Generate
            </button>
            <button class="btn btn-success" id="downloadBtn">
                <i class="fas fa-download"></i> Download PNG
            </button>
            <button class="btn btn-secondary" id="resetBtn">
                <i class="fas fa-undo-alt"></i> Reset
            </button>
        </div>

        <div class="text-muted">
            <i class="fas fa-mobile-screen-button"></i> Optimized for mobile
        </div>
    </div>

    <script>
        // ===== DOM ELEMENTS =====
        const headlineInput = document.getElementById('headlineInput');
        const dateInput = document.getElementById('dateInput');
        const headlineDisplay = document.getElementById('headlineDisplay');
        const dateDisplay = document.getElementById('dateDisplay');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const newsPreview = document.getElementById('newsPreview');

        // ===== SET TODAY'S DATE AS DEFAULT =====
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;
        dateDisplay.textContent = '📅 ' + formatDate(today);

        // ===== HELPER: FORMAT DATE =====
        function formatDate(dateStr) {
            if (!dateStr) return 'No date';
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-IN', {
                day: 'numeric',
                month: 'short',
                year: 'numeric'
            });
        }

        // ===== UPDATE PREVIEW =====
        function updatePreview() {
            const headline = headlineInput.value.trim() || 'Your Headline Here';
            headlineDisplay.innerHTML = headline;

            const dateVal = dateInput.value;
            if (dateVal) {
                dateDisplay.textContent = '📅 ' + formatDate(dateVal);
            } else {
                dateDisplay.textContent = '📅 No date set';
            }
        }

        // ===== GENERATE BUTTON =====
        generateBtn.addEventListener('click', function(e) {
            e.preventDefault();
            updatePreview();
            // Haptic feedback simulation (vibration if supported)
            if (navigator.vibrate) navigator.vibrate(10);
        });

        // ===== RESET BUTTON =====
        resetBtn.addEventListener('click', function(e) {
            e.preventDefault();
            headlineInput.value = 'Breaking: Major Event Today';
            dateInput.value = today;
            dateDisplay.textContent = '📅 ' + formatDate(today);
            headlineDisplay.innerHTML = 'Breaking: Major Event Today';
            if (navigator.vibrate) navigator.vibrate(5);
        });

        // ===== DOWNLOAD PNG (html2canvas) =====
        downloadBtn.addEventListener('click', function(e) {
            e.preventDefault();

            // First update preview to latest values
            updatePreview();

            // Show loading state
            const originalText = downloadBtn.innerHTML;
            downloadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
            downloadBtn.disabled = true;

            // Load html2canvas from CDN if not available
            if (typeof html2canvas === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                script.onload = function() {
                    captureAndDownload();
                };
                script.onerror = function() {
                    alert('Failed to load image library. Please check your internet connection.');
                    resetDownloadButton(originalText);
                };
                document.head.appendChild(script);
            } else {
                captureAndDownload();
            }

            function captureAndDownload() {
                html2canvas(newsPreview, {
                    scale: 2,
                    backgroundColor: '#faf8f6',
                    allowTaint: false,
                    useCORS: true,
                    logging: false,
                    width: newsPreview.scrollWidth,
                    height: newsPreview.scrollHeight
                }).then(function(canvas) {
                    const link = document.createElement('a');
                    link.download = 'marwar-news-' + new Date().toISOString().slice(0, 10) + '.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    resetDownloadButton(originalText);
                }).catch(function(err) {
                    console.error('Download error:', err);
                    alert('Could not generate image. Please try again.');
                    resetDownloadButton(originalText);
                });
            }

            function resetDownloadButton(text) {
                downloadBtn.innerHTML = text || '<i class="fas fa-download"></i> Download PNG';
                downloadBtn.disabled = false;
            }
        });

        // ===== AUTO-UPDATE on input change =====
        headlineInput.addEventListener('input', updatePreview);
        dateInput.addEventListener('change', updatePreview);

        // ===== INITIAL UPDATE =====
        updatePreview();

        // ===== HANDLE TOUCH FEEDBACK =====
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.style.opacity = '0.8';
            }, { passive: true });
            btn.addEventListener('touchend', function() {
                this.style.opacity = '1';
            }, { passive: true });
        });

        console.log('📰 Marwar Time News Studio loaded successfully!');
    </script>

</body>
</html>
